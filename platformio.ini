[env:ttgo-t1]
platform      = espressif32
board         = ttgo-t1
framework     = arduino

; Serial monitor
monitor_speed = 115200

; TFT_eSPI: tell it which setup to use via build flag
; (alternative to editing User_Setup_Select.h by hand)
build_flags =
    -D USER_SETUP_LOADED
    -D ST7789_DRIVER
    -D TFT_WIDTH=135
    -D TFT_HEIGHT=240
    -D CGRAM_OFFSET
    -D TFT_MISO=-1
    -D TFT_MOSI=19
    -D TFT_SCLK=18
    -D TFT_CS=5
    -D TFT_DC=16
    -D TFT_RST=23
    -D TFT_BL=4
    -D TFT_BACKLIGHT_ON=HIGH
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=6000000
    -D SPI_TOUCH_FREQUENCY=2500000
    -D LOAD_GLCD
    -D LOAD_FONT2
    -D LOAD_FONT4
    -D LOAD_FONT6
    -D LOAD_FONT7
    -D LOAD_FONT8
    -D LOAD_GFXFF
    -D SMOOTH_FONT

lib_deps =
    bodmer/TFT_eSPI@^2.5.43

; Increase app partition for larger sketches
board_build.partitions = huge_app.csv
